spring.application.name=robot-web

spring.datasource.url=jdbc:mysql://localhost:3306/robot_web?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=robot_user
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

mqtt.broker-url=tcp://192.168.0.55:1883
mqtt.client-id=robot-web-subscriber
mqtt.topic=sensor/pm/+
mqtt.qos=1
mqtt.command-topic=robot/1/cmd

# 존(zone) 개념 폐기 후 PM 임계 자동출동 로직은 ROS2 task_manager 와 중복되므로
# 비활성화. PM 데이터는 계속 DB 저장하고 대시보드에 표시만 한다.
auto-dispatch.enabled=false
auto-dispatch.pm25-threshold=50
auto-dispatch.pm10-threshold=100
auto-dispatch.cooldown-seconds=60
